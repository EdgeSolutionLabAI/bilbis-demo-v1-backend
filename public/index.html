<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Image Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #f0f2f5;
      font-family: system-ui, sans-serif;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
    }

    .image-frame {
      width: 600px;
      height: 400px;
      border: 3px solid #c0c4cc;
      border-radius: 12px;
      overflow: hidden;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s ease;
    }

    .image-frame img.loading {
      opacity: 0.4;
    }

    .placeholder {
      color: #999;
      font-size: 0.95rem;
    }

    button {
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #4361ee;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover { background: #3451d1; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Random Image Generator</h1>

  <div class="image-frame" id="frame">
    <span class="placeholder" id="placeholder">Click the button to load an image</span>
    <img id="photo" src="" alt="Random image" style="display:none;" />
  </div>

  <button id="btn">Generate New Image</button>

  <script>
    const btn = document.getElementById('btn');
    const photo = document.getElementById('photo');
    const placeholder = document.getElementById('placeholder');

    async function loadNewImage() {
      btn.disabled = true;
      photo.classList.add('loading');

      try {
        const res = await fetch('/api/v1/image/random');
        const { url } = await res.json();

        // Pre-load to avoid flash of broken image
        await new Promise((resolve, reject) => {
          const tmp = new Image();
          tmp.onload = resolve;
          tmp.onerror = reject;
          tmp.src = url;
        });

        photo.src = url;
        photo.style.display = 'block';
        placeholder.style.display = 'none';
      } catch {
        placeholder.textContent = 'Failed to load image. Try again.';
        placeholder.style.display = 'block';
      } finally {
        photo.classList.remove('loading');
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', loadNewImage);
  </script>
</body>
</html>
